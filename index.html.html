<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIY Dynamic · Deadlift</title>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0d11;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        /* ----- ENTRY / CANVAS WRAPPER ----- */
        #entry-wrapper {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 50% 80%, #1a1f2a, #07080b);
            transition: opacity 1.2s cubic-bezier(0.65, 0, 0.35, 1),
                transform 1.2s cubic-bezier(0.65, 0, 0.35, 1);
        }
        #entry-wrapper.hide {
            opacity: 0;
            transform: scale(1.04);
            pointer-events: none;
        }

        #deadlift-canvas {
            display: block;
            width: 100%;
            max-width: 700px;
            height: auto;
            aspect-ratio: 700 / 500;
            border-radius: 28px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            background: transparent;
            cursor: default;
        }

        /* ----- LOADING BAR (beneath canvas) ----- */
        .loader-wrap {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.7;
            transition: opacity 0.6s;
        }
        .loader-wrap.hide {
            opacity: 0;
        }
        .loader-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.4);
        }
        .loader-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f97316, #fbbf24, #f97316);
            background-size: 200% 100%;
            border-radius: 4px;
            animation: shimmer 1.8s linear infinite;
            transition: width 0.15s ease-out;
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
        .loader-label {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            font-weight: 300;
        }

        /* ----- LOGIN PAGE (glass) ----- */
        #login-page {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: radial-gradient(ellipse at 30% 40%, rgba(249, 115, 22, 0.08), transparent 70%),
                radial-gradient(ellipse at 70% 60%, rgba(251, 191, 36, 0.05), transparent 60%),
                #0b0d11;
        }
        #login-page.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* floating orbs (echo / dismay) */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            pointer-events: none;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: #f97316;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 320px;
            height: 320px;
            background: #fbbf24;
            bottom: -80px;
            left: -80px;
            animation-delay: -4s;
        }
        .orb-3 {
            width: 280px;
            height: 280px;
            background: #ec4899;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
            opacity: 0.06;
        }
        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(40px, -30px) scale(1.2);
            }
        }

        /* ----- GLASS CARD ----- */
        .glass-card {
            position: relative;
            width: 94%;
            max-width: 400px;
            padding: 44px 36px 40px;
            background: rgba(255, 255, 255, 0.035);
            backdrop-filter: blur(28px) saturate(1.2);
            -webkit-backdrop-filter: blur(28px) saturate(1.2);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: transform 0.3s ease, box-shadow 0.4s ease;
            z-index: 2;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 50px 130px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        /* echo ring (pulse behind card) */
        .echo-ring {
            position: absolute;
            inset: -12px;
            border-radius: 48px;
            border: 1px solid rgba(249, 115, 22, 0.08);
            animation: echoPulse 3.2s ease-out infinite;
            pointer-events: none;
        }
        .echo-ring::after {
            content: '';
            position: absolute;
            inset: -20px;
            border-radius: 56px;
            border: 1px solid rgba(249, 115, 22, 0.04);
            animation: echoPulse 3.2s ease-out infinite 0.8s;
        }
        @keyframes echoPulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.12);
                opacity: 0;
            }
        }

        /* ----- LOGIN HEADER ----- */
        .login-header {
            text-align: center;
            margin-bottom: 34px;
        }
        .login-header .icon {
            font-size: 42px;
            display: block;
            margin-bottom: 8px;
            animation: iconFloat 3s ease-in-out infinite;
        }
        @keyframes iconFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f0f2f5;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f97316, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-header p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 4px;
            letter-spacing: 0.4px;
            font-weight: 300;
        }

        /* ----- FORM ----- */
        .form-group {
            position: relative;
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 6px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .form-group:focus-within label {
            color: #fbbf24;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            color: #f0f2f5;
            font-size: 15px;
            font-weight: 400;
            outline: none;
            transition: border 0.3s, background 0.3s, box-shadow 0.3s;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.15);
            font-weight: 300;
        }
        .form-group input:focus {
            border-color: rgba(249, 115, 22, 0.4);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.08),
                inset 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        /* hover effect */
        .form-group input:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }

        /* ----- BUTTON (JUST) ----- */
        .btn-login {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease, background 0.3s ease;
            box-shadow: 0 8px 28px rgba(249, 115, 22, 0.25);
            position: relative;
            overflow: hidden;
        }
        .btn-login:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 12px 40px rgba(249, 115, 22, 0.35);
            background: linear-gradient(135deg, #fb923c, #ea580c);
        }
        .btn-login:active {
            transform: scale(0.96);
        }

        /* ripple on click (echo effect) */
        .btn-login .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: rippleAnim 0.7s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ----- BURST / JABURGLO EFFECT (particle canvas overlay) ----- */
        #burst-canvas {
            position: fixed;
            inset: 0;
            z-index: 30;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #burst-canvas.active {
            opacity: 1;
            pointer-events: none;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 520px) {
            .glass-card {
                padding: 32px 22px 30px;
                border-radius: 28px;
            }
            .login-header h1 {
                font-size: 20px;
            }
            .btn-login {
                font-size: 15px;
                padding: 14px;
            }
            #deadlift-canvas {
                border-radius: 16px;
                max-width: 94%;
            }
            .loader-wrap {
                bottom: 8%;
                width: 150px;
            }
            .orb-1,
            .orb-2 {
                width: 200px;
                height: 200px;
            }
        }
        @media (max-width: 400px) {
            .glass-card {
                padding: 24px 16px 26px;
            }
            .form-group input {
                padding: 12px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ENTRY WRAPPER ===== -->
    <div id="entry-wrapper">
        <canvas id="deadlift-canvas" width="700" height="500"></canvas>

        <div class="loader-wrap" id="loaderWrap">
            <div class="loader-track">
                <div class="loader-fill" id="loaderFill"></div>
            </div>
            <span class="loader-label">Lifting &bull; loading</span>
        </div>
    </div>

    <!-- ===== LOGIN PAGE ===== -->
    <div id="login-page">
        <!-- floating orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="glass-card">
            <!-- echo ring -->
            <div class="echo-ring"></div>

            <div class="login-header">
                <span class="icon">🏋️</span>
                <h1>DIY · Deadlift</h1>
                <p>dynamic • echo • hover</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="enter your handle" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" />
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    ⚡ Just Login
                </button>
            </form>

            <p style="text-align:center; margin-top:20px; font-size:11px; color:rgba(255,255,255,0.12); letter-spacing:1px;">
                click — burst · echo · hover
            </p>
        </div>
    </div>

    <!-- ===== BURST CANVAS (overlay) ===== -->
    <canvas id="burst-canvas"></canvas>

    <script>
        // ============================================================
        //  1.  DEADLIFT ANIMATION (Canvas)
        // ============================================================
        const canvas = document.getElementById('deadlift-canvas');
        const ctx = canvas.getContext('2d');
        const W = 700,
            H = 500;

        let progress = 0; // 0 → 1  (squat → stand)
        let direction = 1;
        let cycleCount = 0;
        let animId = null;
        let isTransitioning = false;

        // ---- character joint positions (keyframes) ----
        // t = 0 (bottom squat)  →  t = 1 (top stand)
        function getPose(t) {
            // smooth ease in-out
            const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

            const cx = 350,
                cy = 320; // anchor (hip roughly)

            // head
            const headY = cy - 140 - e * 60;
            const headR = 22;

            // shoulders
            const shY = cy - 110 - e * 50;
            const shX = cx;

            // hip
            const hipY = cy - 70 + e * 30;
            const hipX = cx;

            // knees
            const kneeY = hipY + 70 - e * 40;
            const kneeX = cx - 40 + e * 10;

            // feet
            const footY = kneeY + 60 - e * 20;
            const footX = cx - 20 + e * 18;

            // hands (barbell grip)
            const handY = hipY + 20 - e * 50;
            const handX = cx - 60 + e * 15;

            // barbell
            const barY = handY + 4;
            const barL = 150;
            const barX = cx;

            return {
                head: { x: cx, y: headY, r: headR },
                shoulder: { x: shX, y: shY },
                hip: { x: hipX, y: hipY },
                knee: { x: kneeX, y: kneeY },
                foot: { x: footX, y: footY },
                hand: { x: handX, y: handY },
                bar: { x: barX, y: barY, len: barL }
            };
        }

        // ---- drawing ----
        function drawDeadlift(t) {
            ctx.clearRect(0, 0, W, H);

            const p = getPose(t);

            // ---- background subtle grid ----
            ctx.save();
            ctx.globalAlpha = 0.04;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < W; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, H);
                ctx.stroke();
            }
            for (let i = 0; i < H; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(W, i);
                ctx.stroke();
            }
            ctx.restore();

            // ---- floor line ----
            ctx.save();
            ctx.shadowColor = 'rgba(249,115,22,0.08)';
            ctx.shadowBlur = 20;
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(40, 440);
            ctx.lineTo(660, 440);
            ctx.stroke();
            ctx.restore();

            const { head, shoulder, hip, knee, foot, hand, bar } = p;

            // ---- draw barbell (behind hands) ----
            ctx.save();
            // bar
            ctx.shadowColor = 'rgba(249,115,22,0.2)';
            ctx.shadowBlur = 16;
            ctx.strokeStyle = '#9ca3af';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(bar.x - bar.len / 2, bar.y);
            ctx.lineTo(bar.x + bar.len / 2, bar.y);
            ctx.stroke();

            // weights (plates)
            const plateColors = ['#f97316', '#fbbf24', '#f97316'];
            const platePositions = [
                bar.x - bar.len / 2 - 18,
                bar.x - bar.len / 2 - 6,
                bar.x + bar.len / 2 + 6,
                bar.x + bar.len / 2 + 18
            ];
            ctx.shadowBlur = 12;
            platePositions.forEach((px, i) => {
                const c = plateColors[i % plateColors.length];
                ctx.fillStyle = c;
                ctx.shadowColor = c + '44';
                ctx.beginPath();
                ctx.ellipse(px, bar.y, 12, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                // inner ring
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.ellipse(px, bar.y, 5, 8, 0, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();

            // ---- draw body (limbs) ----
            ctx.save();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = 'rgba(249,115,22,0.06)';
            ctx.shadowBlur = 8;

            const limbColor = 'rgba(255,255,255,0.55)';
            const limbWidth = 6;

            // left leg: hip → knee → foot
            ctx.strokeStyle = limbColor;
            ctx.lineWidth = limbWidth;
            ctx.beginPath();
            ctx.moveTo(hip.x, hip.y);
            ctx.lineTo(knee.x, knee.y);
            ctx.lineTo(foot.x, foot.y);
            ctx.stroke();

            // right leg (mirror)
            const rKneeX = knee.x + 80 - 20 * (1 - t);
            const rFootX = foot.x + 80 - 36 * (1 - t);
            ctx.beginPath();
            ctx.moveTo(hip.x, hip.y);
            ctx.lineTo(rKneeX, knee.y);
            ctx.lineTo(rFootX, foot.y);
            ctx.stroke();

            // torso: shoulder → hip
            ctx.strokeStyle = limbColor;
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(shoulder.x, shoulder.y);
            ctx.lineTo(hip.x, hip.y);
            ctx.stroke();

            // arms: shoulder → hand (with barbell grip)
            ctx.strokeStyle = limbColor;
            ctx.lineWidth = 5;
            // left arm
            ctx.beginPath();
            ctx.moveTo(shoulder.x - 22, shoulder.y + 4);
            ctx.lineTo(hand.x, hand.y - 6);
            ctx.stroke();
            // right arm
            ctx.beginPath();
            ctx.moveTo(shoulder.x + 22, shoulder.y + 4);
            ctx.lineTo(hand.x + 100, hand.y - 6);
            ctx.stroke();

            // ---- head ----
            ctx.shadowColor = 'rgba(249,115,22,0.12)';
            ctx.shadowBlur = 20;
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(head.x, head.y, head.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // face (simple)
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            // eyes
            ctx.beginPath();
            ctx.arc(head.x - 8, head.y - 4, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(head.x + 8, head.y - 4, 3, 0, Math.PI * 2);
            ctx.fill();
            // mouth (determined)
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(head.x, head.y + 6, 6, 0.1, Math.PI - 0.1);
            ctx.stroke();

            ctx.restore();

            // ---- glow under barbell ----
            ctx.save();
            const grad = ctx.createRadialGradient(bar.x, bar.y + 10, 4, bar.x, bar.y + 10, 120);
            grad.addColorStop(0, 'rgba(249,115,22,0.06)');
            grad.addColorStop(1, 'rgba(249,115,22,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(bar.x - 120, bar.y - 80, 240, 160);
            ctx.restore();

            // ---- "DIY" badge ----
            ctx.save();
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.font = '11px "Segoe UI", monospace';
            ctx.letterSpacing = '2px';
            ctx.fillText('⚡ DIY · DEADLIFT', 20, 30);
            ctx.restore();
        }

        // ---- animation loop ----
        function animateDeadlift() {
            const speed = 0.006;
            progress += direction * speed;

            if (progress >= 1) {
                progress = 1;
                direction = -1;
                cycleCount++;
                if (cycleCount >= 2 && !isTransitioning) {
                    // time to show login!
                    isTransitioning = true;
                    showLogin();
                }
            } else if (progress <= 0) {
                progress = 0;
                direction = 1;
            }

            // update loader
            const pct = Math.round(progress * 100);
            document.getElementById('loaderFill').style.width = pct + '%';

            drawDeadlift(progress);
            animId = requestAnimationFrame(animateDeadlift);
        }

        // ---- transition to login ----
        function showLogin() {
            // hide entry wrapper
            const entry = document.getElementById('entry-wrapper');
            entry.classList.add('hide');
            document.getElementById('loaderWrap').classList.add('hide');

            // show login after delay
            setTimeout(() => {
                document.getElementById('login-page').classList.add('show');
                // stop deadlift animation (optional)
                if (animId) {
                    cancelAnimationFrame(animId);
                    animId = null;
                }
                // draw final frame
                drawDeadlift(1);
                // trigger burst on entry
                triggerBurst(350, 250);
            }, 900);
        }

        // ---- start ----
        animateDeadlift();

        // ---- resize handling ----
        function resizeCanvas() {
            // canvas is fixed size, just ensure CSS aspect
        }
        window.addEventListener('resize', resizeCanvas);

        // ============================================================
        //  2.  BURST / JABURGLO EFFECT (particle system)
        // ============================================================
        const burstCanvas = document.getElementById('burst-canvas');
        const bCtx = burstCanvas.getContext('2d');
        let burstW, burstH;
        let particles = [];
        let burstActive = false;
        let burstAnimId = null;

        function resizeBurst() {
            burstW = window.innerWidth;
            burstH = window.innerHeight;
            burstCanvas.width = burstW;
            burstCanvas.height = burstH;
        }
        window.addEventListener('resize', resizeBurst);
        resizeBurst();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 60 + Math.random() * 200;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 40;
                this.life = 1;
                this.decay = 0.008 + Math.random() * 0.012;
                this.size = 6 + Math.random() * 16;
                this.hue = 20 + Math.random() * 30; // orange/gold
                this.sat = 80 + Math.random() * 20;
                this.light = 50 + Math.random() * 30;
                this.gravity = 0.35;
                this.shape = Math.random() > 0.5 ? 'circle' : 'square';
            }

            update() {
                this.x += this.vx * 0.016;
                this.y += this.vy * 0.016;
                this.vy += this.gravity;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.life -= this.decay;
                this.size *= 0.998;
                return this.life > 0;
            }

            draw(ctx) {
                const alpha = this.life * 0.9;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
                ctx.shadowBlur = 24;
                ctx.fillStyle = `hsl(${this.hue}, ${this.sat}%, ${this.light}%)`;
                if (this.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    const s = this.size * 0.6;
                    ctx.fillRect(this.x - s / 2, this.y - s / 2, s, s);
                }
                // inner glow
                ctx.shadowBlur = 40;
                ctx.globalAlpha = alpha * 0.3;
                ctx.fillStyle = '#fff';
                if (this.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    const s2 = this.size * 0.2;
                    ctx.fillRect(this.x - s2 / 2, this.y - s2 / 2, s2, s2);
                }
                ctx.restore();
            }
        }

        function triggerBurst(x, y) {
            const count = 120 + Math.floor(Math.random() * 80);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
            burstCanvas.classList.add('active');
            burstActive = true;
            if (burstAnimId) cancelAnimationFrame(burstAnimId);
            animateBurst();
        }

        function animateBurst() {
            bCtx.clearRect(0, 0, burstW, burstH);

            particles = particles.filter(p => p.update());
            particles.forEach(p => p.draw(bCtx));

            if (particles.length > 0) {
                burstAnimId = requestAnimationFrame(animateBurst);
            } else {
                burstCanvas.classList.remove('active');
                burstActive = false;
                burstAnimId = null;
                bCtx.clearRect(0, 0, burstW, burstH);
            }
        }

        // ============================================================
        //  3.  LOGIN FORM + EFFECTS
        // ============================================================
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        // ---- Ripple on button click (echo effect) ----
        loginBtn.addEventListener('click', function(e) {
            // ripple
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const size = 80;
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x - size / 2 + 'px';
            ripple.style.top = y - size / 2 + 'px';
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 700);

            // BURST! (Jaburglo Kar Devowala)
            const cx = e.clientX;
            const cy = e.clientY;
            triggerBurst(cx, cy);

            // also burst from center of card
            const cardRect = this.closest('.glass-card').getBoundingClientRect();
            const cx2 = cardRect.left + cardRect.width / 2;
            const cy2 = cardRect.top + cardRect.height / 2;
            setTimeout(() => triggerBurst(cx2, cy2), 120);

            // form feedback
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) {
                // shake effect
                this.style.transform = 'translateX(-6px)';
                setTimeout(() => this.style.transform = 'translateX(6px)', 80);
                setTimeout(() => this.style.transform = 'translateX(-4px)', 160);
                setTimeout(() => this.style.transform = 'translateX(4px)', 240);
                setTimeout(() => this.style.transform = 'translateX(0)', 320);
                return;
            }

            // success — extra burst + message
            setTimeout(() => {
                triggerBurst(window.innerWidth / 2, window.innerHeight / 2);
            }, 300);

            // show a toast-like message
            const origText = this.innerHTML;
            this.innerHTML = '✅ LIFTED!';
            this.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
            this.style.boxShadow = '0 8px 32px rgba(34,197,94,0.3)';
            setTimeout(() => {
                this.innerHTML = origText;
                this.style.background = '';
                this.style.boxShadow = '';
            }, 2000);
        });

        // ---- hover effect on card (already in CSS) ----
        // ---- echo effect: the ring pulses automatically (CSS) ----

        // ---- "Dismay" effect: dramatic entrance — already via CSS transition ----
        // we also add a small burst when login page appears (already called from showLogin)

        // ---- extra: click on login page background triggers mini burst ----
        document.getElementById('login-page').addEventListener('click', function(e) {
            if (e.target === this) {
                triggerBurst(e.clientX, e.clientY);
            }
        });

        // ---- prevent form submission reload ----
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            loginBtn.click();
        });

        // ============================================================
        //  4.  EXTRA: auto-burst on login show (already done)
        // ============================================================
        console.log('🏋️ DIY Deadlift · Dynamic login ready');
        console.log('🔥 Jaburglo Kar Devowala effect active!');
    </script>
</body>
